1name: CI-CD DevSecOps

# Se ejecuta en cada push y pull request a main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write   # necesario para subir resultados SARIF a la pestaña Security

jobs:
  # ===========================================================================
  # 1) CALIDAD Y PRUEBAS
  # ===========================================================================
  build-test:
    name: Lint y Pruebas
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Debug files
        run: ls -la
        
      - name: Debug requirements
        run: cat requirements.txt
          
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 
          pip install flake8 pytest
 
      - name: Lint (flake8)
        run: flake8 . --count --max-line-length=120 --statistics --exclude=.venv

      - name: Pruebas unitarias (pytest)
        run: pytest -v

  # ===========================================================================
  # 2) SAST - Análisis estático de seguridad del código
  # ===========================================================================
  sast:
    name: SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit (vulnerabilidades en código Python)
        run: |
          pip install bandit
          bandit -r . -x ./tests -f txt || true

      - name: Semgrep (reglas de seguridad)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python p/security-audit
        continue-on-error: true

  # ===========================================================================
  # 3) SCA - Escaneo de dependencias vulnerables
  # ===========================================================================
  dependency-scan:
    name: Dependencias (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  # ===========================================================================
  # 4) ESCANEO DE SECRETOS
  # ===========================================================================
  secret-scan:
    name: Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # 5) ESCANEO DE CONTENEDOR (imagen Docker)
  # ===========================================================================
  container-scan:
    name: Contenedor (Trivy)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t secure-notes:${{ github.sha }} .

      - name: Trivy (vulnerabilidades de la imagen)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-notes:${{ github.sha }}
          format: table
          exit-code: "0"          # No rompe el build; reporta hallazgos
          severity: CRITICAL,HIGH

  # ===========================================================================
  # 6) DESPLIEGUE (solo en push a main y si todo lo anterior pasó)
  # ===========================================================================
  deploy:
    name: Desplegar a Render
    runs-on: ubuntu-latest
    needs: [build-test, sast, dependency-scan, secret-scan, container-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Disparar deploy en Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK no configurado; omitiendo despliegue automático."
          else
            curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Despliegue disparado en Render."
          fi
